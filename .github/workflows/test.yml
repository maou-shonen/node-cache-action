name: Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test-cache-save:
    name: Save (${{ matrix.pm }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pm: [npm, pnpm, yarn, bun]
        include:
          - pm: npm
            lockfile: package-lock.json
            install: npm ci
          - pm: pnpm
            lockfile: pnpm-lock.yaml
            install: pnpm install --frozen-lockfile
          - pm: yarn
            lockfile: yarn.lock
            install: yarn install --immutable
          - pm: bun
            lockfile: bun.lock
            install: bun install --frozen-lockfile
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        if: matrix.pm == 'pnpm'
        with:
          version: latest

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        if: matrix.pm == 'bun'

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        if: matrix.pm != 'bun'
        with:
          node-version: 24

      - name: Setup test project
        run: |
          rm -f pnpm-lock.yaml package-lock.json yarn.lock bun.lock bun.lockb
          cp fixtures/package.json .
          cp fixtures/${{ matrix.lockfile }} .

      - uses: ./
        id: cache

      - name: Verify detection
        run: |
          [ "${{ steps.cache.outputs.package-manager }}" = "${{ matrix.pm }}" ]
          [ "${{ steps.cache.outputs.lockfile }}" = "${{ matrix.lockfile }}" ]
          [ -n "${{ steps.cache.outputs.cache-key }}" ]

      - run: ${{ matrix.install }}
      - run: test -f node_modules/ms/package.json

  test-cache-restore:
    name: Restore (${{ matrix.pm }})
    needs: test-cache-save
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pm: [npm, pnpm, yarn, bun]
        include:
          - pm: npm
            lockfile: package-lock.json
          - pm: pnpm
            lockfile: pnpm-lock.yaml
          - pm: yarn
            lockfile: yarn.lock
          - pm: bun
            lockfile: bun.lock
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        if: matrix.pm == 'pnpm'
        with:
          version: latest

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        if: matrix.pm == 'bun'

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        if: matrix.pm != 'bun'
        with:
          node-version: 24

      - name: Setup test project
        run: |
          rm -f pnpm-lock.yaml package-lock.json yarn.lock bun.lock bun.lockb
          cp fixtures/package.json .
          cp fixtures/${{ matrix.lockfile }} .

      - uses: ./
        id: cache

      - name: Verify cache hit
        run: |
          echo "cache-hit=${{ steps.cache.outputs.cache-hit }}"
          [ "${{ steps.cache.outputs.cache-hit }}" = "true" ]

      - name: Verify node_modules restored
        run: test -f node_modules/ms/package.json

  test-priority:
    name: Priority (${{ matrix.expected }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - files: "bun.lockb pnpm-lock.yaml"
            expected: bun
          - files: "pnpm-lock.yaml yarn.lock"
            expected: pnpm
          - files: "yarn.lock package-lock.json"
            expected: yarn
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup test lockfiles
        run: |
          rm -f pnpm-lock.yaml package-lock.json yarn.lock bun.lock bun.lockb
          touch ${{ matrix.files }}
      - uses: ./
        id: cache
      - run: '[ "${{ steps.cache.outputs.package-manager }}" = "${{ matrix.expected }}" ]'

  test-no-lockfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Remove all lockfiles
        run: rm -f pnpm-lock.yaml package-lock.json yarn.lock bun.lock bun.lockb
      - uses: ./
        id: cache
      - run: '[ -z "${{ steps.cache.outputs.package-manager }}" ]'
